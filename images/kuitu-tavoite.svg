<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <rect width="1200" height="900" fill="#f7fbff"/>
  <rect x="40" y="40" width="1120" height="820" rx="34" fill="#ffffff" stroke="#dce7ef" stroke-width="4"/>
  <text x="80" y="135" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="800" fill="#142133">
    Päivittäinen kuitutavoite
  </text>
  <text x="80" y="190" font-family="Inter, Arial, sans-serif" font-size="28" fill="#556476">
    Selkeä käytännön tavoite aikuisille
  </text>

  <rect x="80" y="250" width="470" height="230" rx="28" fill="#eef8ef" stroke="#d6ead9" stroke-width="3"/>
  <text x="115" y="325" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700" fill="#142133">Aikuinen nainen</text>
  <text x="115" y="405" font-family="Inter, Arial, sans-serif" font-size="74" font-weight="900" fill="#1d6a5b">noin 25 g</text>
  <text x="115" y="450" font-family="Inter, Arial, sans-serif" font-size="28" fill="#556476">kuitua päivässä</text>

  <rect x="650" y="250" width="470" height="230" rx="28" fill="#eef4ff" stroke="#dce7ef" stroke-width="3"/>
  <text x="685" y="325" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700" fill="#142133">Aikuinen mies</text>
  <text x="685" y="405" font-family="Inter, Arial, sans-serif" font-size="74" font-weight="900" fill="#1d6a5b">noin 35 g</text>
  <text x="685" y="450" font-family="Inter, Arial, sans-serif" font-size="28" fill="#556476">kuitua päivässä</text>

  <rect x="80" y="540" width="1040" height="220" rx="28" fill="#f4fbf8" stroke="#cfe7df" stroke-width="3"/>
  <text x="115" y="615" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#142133">
    Hyvät kuitulähteet samalle päivälle
  </text>
  <text x="115" y="680" font-family="Inter, Arial, sans-serif" font-size="28" fill="#556476">
    kaura • marjat • siemenet • palkokasvit • kasvikset • täysjyväiset vaihtoehdot
  </text>
  <text x="115" y="725" font-family="Inter, Arial, sans-serif" font-size="24" fill="#556476">
    Tavoite kannattaa rakentaa useasta lähteestä, ei vain yhdestä tuotteesta.
  </text>
</svg>
